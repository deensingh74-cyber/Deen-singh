<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UGPF - सेवा परमो धर्म</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div id="root"></div>

    <script type="text/babel">
        // मॉक डेटा (शुरुआती टेस्टिंग के लिए)
        const initialSubmissions = [
            {
                id: "UGPF-2026-001",
                studentEmail: "student1@gmail.com",
                formTitle: "उच्च शिक्षा छात्रवृत्ति फॉर्म",
                currentLevel: 2, 
                status: "Pending", 
                objectionMessage: "",
                logs: [
                    { step: "छात्र द्वारा सबमिट किया गया", status: "Approved", time: "24 जून 2026, 10:00 AM", by: "student1@gmail.com" },
                    { step: "स्तर 1 (सत्यापन अधिकारी)", status: "Approved", time: "24 जून 2026, 02:00 PM", by: "officer1@ugpf.org" },
                    { step: "स्तर 2 (वरिष्ठ अधिकारी)", status: "Pending", time: "प्रतीक्षारत", by: "officer2@ugpf.org" }
                ]
            },
            {
                id: "UGPF-2026-002",
                studentEmail: "student2@gmail.com",
                formTitle: "खेल प्रतियोगिता सहायता फॉर्म",
                currentLevel: 0,
                status: "Objection",
                objectionMessage: "कृपया अपनी 10वीं की मार्कशीट दोबारा साफ अपलोड करें।",
                logs: [
                    { step: "छात्र द्वारा सबमिट किया गया", status: "Approved", time: "23 जून 2026", by: "student2@gmail.com" },
                    { step: "स्तर 1 (सत्यापन अधिकारी)", status: "Objection", time: "24 जून 2026", by: "officer1@ugpf.org" }
                ]
            }
        ];

        function UGPFApp() {
            const [userEmail, setUserEmail] = React.useState('');
            const [userRole, setUserRole] = React.useState(''); // student, officer, head_officer
            const [isLoggedIn, setIsLoggedIn] = React.useState(false);
            const [submissions, setSubmissions] = React.useState(initialSubmissions);
            const [selectedForm, setSelectedForm] = React.useState(null);
            const [remarks, setRemarks] = React.useState('');

            // ईमेल आईडी के आधार पर ऑटो-रोल डिटेक्शन
            const handleLogin = (e) => {
                e.preventDefault();
                if (!userEmail) return;
                
                if (userEmail === "admin@ugpf.org") { // मुख्य अधिकारी / एडमिन ईमेल
                    setUserRole("head_officer");
                } else if (userEmail.includes("officer")) {
                    setUserRole("officer");
                } else {
                    setUserRole("student");
                }
                setIsLoggedIn(true);
            };

            // अधिकारियों द्वारा निर्णय (Approval/Objection) लेने का लॉजिक
            const processAction = (id, action) => {
                const updated = submissions.map(sub => {
                    if (sub.id === id) {
                        let nextStatus = "Pending";
                        let nextLevel = sub.currentLevel;

                        if (action === "APPROVE") {
                            if (userRole === "head_officer" || sub.currentLevel === 2) {
                                nextStatus = "Approved";
                            } else {
                                nextLevel += 1;
                            }
                        } else if (action === "OBJECTION") {
                            nextStatus = "Objection";
                            nextLevel = 0; // छात्र के पास वापस संशोधन के लिए गया
                        }

                        const newLog = {
                            step: userRole === "head_officer" ? "प्रधान अधिकारी (Head Officer) समीक्षा" : `स्तर ${sub.currentLevel} अधिकारी समीक्षा`,
                            status: action === "APPROVE" ? "Approved" : "Objection",
                            time: "अभी-अभी (2026)",
                            by: userEmail
                        };

                        return {
                            ...sub,
                            status: nextStatus,
                            currentLevel: nextLevel,
                            objectionMessage: action === "OBJECTION" ? remarks : "",
                            logs: [...sub.logs, newLog]
                        };
                    }
                    return sub;
                });
                setSubmissions(updated);
                setSelectedForm(null);
                setRemarks('');
            };

            // 1. लॉगिन स्क्रीन (Login Screen UI)
            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-gradient-to-tr from-blue-600 via-indigo-700 to-purple-800 flex flex-col justify-center items-center p-4 text-white">
                        <div className="text-center mb-8">
                            <h1 className="text-6xl font-extrabold tracking-wider mb-2">UGPF</h1>
                            <p className="text-xl italic text-yellow-300 font-medium">"सेवा परमो धर्म"</p>
                        </div>
                        <div className="bg-white text-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md">
                            <h2 className="text-2xl font-bold text-center mb-6 text-indigo-900">पोर्टल में लॉगिन करें</h2>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-semibold mb-1 text-gray-600">ईमेल आईडी (Email ID)</label>
                                    <input 
                                        type="email" 
                                        placeholder="example@ugpf.org" 
                                        className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none"
                                        value={userEmail}
                                        onChange={(e) => setUserEmail(e.target.value)}
                                        required
                                    />
                                    <p className="text-xs text-gray-400 mt-2">* एडमिन के लिए <b>admin@ugpf.org</b> डालें</p>
                                    <p className="text-xs text-gray-400">* अधिकारियों के लिए ईमेल में <b>officer</b> शब्द होना ज़रूरी है</p>
                                </div>
                                <button type="submit" className="w-full bg-gradient-to-r from-orange-500 to-yellow-500 text-white font-bold py-3 rounded-lg shadow-lg hover:opacity-90 transition duration-200">
                                    प्रवेश करें →
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            // 2. मुख्य डैशबोर्ड (Main Dashboard UI)
            return (
                <div className="min-h-screen bg-gray-50 text-gray-800">
                    {/* रंगीन हेडर */}
                    <header className="bg-gradient-to-r from-indigo-900 via-purple-900 to-indigo-800 text-white shadow-xl px-6 py-4 flex justify-between items-center">
                        <div>
                            <h1 className="text-3xl font-black tracking-tight flex items-center gap-2">
                                UGPF <span className="text-xs bg-yellow-400 text-indigo-950 font-bold px-2 py-0.5 rounded">PORTAL</span>
                            </h1>
                            <p className="text-xs italic text-yellow-300 mt-0.5">सेवा परमो धर्म</p>
                        </div>
                        <div className="text-right flex items-center gap-4">
                            <div>
                                <p className="font-bold text-sm text-purple-200">{userEmail}</p>
                                <p className="text-xs uppercase bg-white/20 px-2 py-0.5 rounded inline-block mt-0.5">
                                    {userRole === 'head_officer' ? 'प्रधान अधिकारी (Head)' : userRole === 'officer' ? 'समीक्षा अधिकारी' : 'छात्र (Student)'}
                                </p>
                            </div>
                            <button onClick={() => setIsLoggedIn(false)} className="bg-red-500 hover:bg-red-600 text-white text-xs font-bold px-3 py-2 rounded-lg transition">
                                लॉगआउट
                            </button>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-6">
                        {/* स्टेटस समरी कार्ड्स */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <div className="bg-gradient-to-br from-green-500 to-emerald-600 text-white p-5 rounded-2xl shadow-md">
                                <h3 className="text-lg font-medium opacity-90">स्वीकृत फॉर्म (Approved)</h3>
                                <p className="text-4xl font-black mt-2">{submissions.filter(s => s.status === 'Approved').length}</p>
                            </div>
                            <div className="bg-gradient-to-br from-amber-500 to-orange-500 text-white p-5 rounded-2xl shadow-md">
                                <h3 className="text-lg font-medium opacity-90">लंबित समीक्षा (Pending)</h3>
                                <p className="text-4xl font-black mt-2">{submissions.filter(s => s.status === 'Pending').length}</p>
                            </div>
                            <div className="bg-gradient-to-br from-red-500 to-rose-600 text-white p-5 rounded-2xl shadow-md">
                                <h3 className="text-lg font-medium opacity-90">आपत्ति वाले फॉर्म (Objection)</h3>
                                <p className="text-4xl font-black mt-2">{submissions.filter(s => s.status === 'Objection').length}</p>
                            </div>
                        </div>

                        {/* दो भागों में बंटा हुआ डैशबोर्ड */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {/* बायाँ भाग: फॉर्म्स की सूची */}
                            <div className="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                                <h2 className="text-xl font-bold text-indigo-900 mb-4 border-b pb-2">प्राप्त आवेदनों की लाइव स्थिति</h2>
                                <div className="space-y-4">
                                    {submissions.map((sub) => (
                                        <div 
                                            key={sub.id} 
                                            onClick={() => setSelectedForm(sub)}
                                            className={`p-4 rounded-xl border-2 cursor-pointer transition transform hover:-translate-y-0.5 hover:shadow-md ${
                                                selectedForm?.id === sub.id ? 'border-purple-600 bg-purple-50/30' : 'border-gray-100 bg-white'
                                            }`}
                                        >
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <span className="text-xs font-mono font-bold text-purple-700 bg-purple-100 px-2 py-1 rounded">
                                                        {sub.id}
                                                    </span>
                                                    <h4 className="text-lg font-bold text-gray-800 mt-2">{sub.formTitle}</h4>
                                                    <p className="text-sm text-gray-500">आवेदक: {sub.studentEmail}</p>
                                                </div>
                                                <div>
                                                    <span className={`px-3 py-1 rounded-full text-xs font-bold text-white shadow-sm ${
                                                        sub.status === 'Approved' ? 'bg-green-500' : sub.status === 'Objection' ? 'bg-red-500' : 'bg-amber-500'
                                                    }`}>
                                                        {sub.status === 'Approved' ? 'Approved' : sub.status === 'Objection' ? 'Objection' : `Pending (Level ${sub.currentLevel})`}
                                                    </span>
                                                </div>
                                            </div>

                                            {sub.status === 'Objection' && (
                                                <div className="mt-3 bg-red-50 text-red-700 p-2.5 rounded-lg text-xs border border-red-200">
                                                    <strong>आपत्ति टिप्पणी (Objection Comment):</strong> {sub.objectionMessage}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* दायाँ भाग: लाइव स्टेटस ट्रैकिंग टाइमलाइन और एक्शन पैनल */}
                            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                                <h2 className="text-xl font-bold text-indigo-900 mb-4 border-b pb-2">लाइव ट्रैकिंग टाइमलाइन</h2>
                                {selectedForm ? (
                                    <div>
                                        <h3 className="font-bold text-gray-800 text-lg mb-1">{selectedForm.formTitle}</h3>
                                        <p className="text-xs text-gray-400 mb-4">ID: {selectedForm.id}</p>

                                        {/* स्टेपर टाइमलाइन */}
                                        <div className="space-y-4 mb-6 relative before:absolute before:left-3 before:top-2 before:bottom-2 before:w-0.5 before:bg-gray-200">
                                            {selectedForm.logs.map((log, index) => (
                                                <div key={index} className="flex gap-4 items-start relative">
                                                    <div className={`w-6 h-6 rounded-full flex items-center justify-center text-white text-xs font-bold z-10 shrink-0 ${
                                                        log.status === 'Approved' ? 'bg-green-500' : 'bg-red-500'
                                                    }`}>
                                                        ✓
                                                    </div>
                                                    <div className="bg-gray-50 p-3 rounded-lg w-full border border-gray-100">
                                                        <p className="text-sm font-bold text-gray-700">{log.step}</p>
                                                        <p className="text-xs text-gray-400 mt-0.5">{log.time} • {log.by}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        {/* एक्शन पैनल (केवल अधिकारी और एडमिन के लिए एक्टिव होगा) */}
                                        {(userRole === 'head_officer' || userRole === 'officer') && (
                                            <div className="border-t pt-4 bg-purple-50/50 p-4 rounded-xl border border-purple-100">
                                                <h4 className="font-bold text-sm text-indigo-900 mb-2">अधिकारी निर्णय (Officer Action):</h4>
                                                
                                                {userRole === 'head_officer' && (
                                                    <p className="text-xs text-amber-700 mb-2 font-medium">⚠️ आप हेड ऑफिसर हैं, आपके पास ग्लोबल एडिटिंग और सीधे फाइनल अप्रूवल का अधिकार है।</p>
                                                )}

                                                <textarea 
                                                    placeholder="आपत्ति होने पर या सुझाव के रूप में रिमार्क्स यहाँ लिखें..." 
                                                    className="w-full text-sm p-2 rounded-lg border bg-white mb-3 focus:outline-none focus:ring-2 focus:ring-purple-400"
                                                    value={remarks}
                                                    onChange={(e) => setRemarks(e.target.value)}
                                                />
                                                <div className="grid grid-cols-2 gap-2">
                                                    <button 
                                                        onClick={() => processAction(selectedForm.id, "APPROVE")}
                                                        className="bg-green-600 hover:bg-green-700 text-white font-bold text-xs py-2.5 rounded-lg shadow transition"
                                                    >
                                                        {userRole === 'head_officer' ? 'फाइनल अप्रूव करें' : 'स्वीकार कर आगे भेजें'}
                                                    </button>
                                                    <button 
                                                        onClick={() => processAction(selectedForm.id, "OBJECTION")}
                                                        className="bg-red-600 hover:bg-red-700 text-white font-bold text-xs py-2.5 rounded-lg shadow transition"
                                                    >
                                                        आपत्ति (Objection) दें
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="text-center py-12 text-gray-400 text-sm">
                                        स्टूडेंट या अधिकारी के रूप में किसी फॉर्म का लाइव स्टेटस ट्रैक करने के लिए सूची में से एक फॉर्म पर क्लिक करें।
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<UGPFApp />);
    </script>
</body>
</html>
