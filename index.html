<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deen Singh Family Photo</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#eef6ff;
}
header{
    background:#0057b8;
    color:white;
    text-align:center;
    padding:20px;
}
.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}
.login-box{
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}
.google-btn{
    background:#0057b8;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
}
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:30px;
}
.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}
.card img{
    width:100%;
}
.card .content{
    padding:10px;
}
</style>
</head>
<body>

<header>
<h1>Deen Singh Family Photo</h1>
<p>परिवार की यादों का निजी संग्रह</p>
</header>

<div class="container">

<div class="login-box">
<h2>Google से साइन इन करें</h2>

<!-- Google Sign-In -->
<div id="g_id_onload"
data-client_id="YOUR_GOOGLE_CLIENT_ID"
data-callback="handleCredentialResponse">
</div>

<div class="g_id_signin"
data-type="standard">
</div>

<p id="status">अभी लॉगिन नहीं किया गया है</p>
</div>

<div class="gallery">
<div class="card">
<img src="sample-photo.jpg" alt="Photo">
<div class="content">
<h3>पारिवारिक फोटो</h3>
<p>Google Photos से आयात होने पर यहाँ दिखाई देगी।</p>
</div>
</div>
</div>

</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
function handleCredentialResponse(response) {
    document.getElementById("status").innerHTML =
    "Google Login सफल हुआ";
    
    // यहाँ आगे सर्वर पर टोकन भेजा जाएगा
    // और Google Photos API से फोटो प्राप्त की जाएँगी
}
</script><script>
function handleCredentialResponse(response) {

    console.log("Google Login Success");

    document.getElementById("status").innerHTML =
    "✅ सफलतापूर्वक लॉगिन हो गया";

    localStorage.setItem(
        "google_token",
        response.credential
    );

    setTimeout(function(){
        window.location.href = "gallery.html";
    }, 2000);
}
</script>

</body>
</html>
