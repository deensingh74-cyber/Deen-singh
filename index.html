
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deen Singh - Profile & Gallery</title>
    <style>
        /* Modern Background aur General Settings */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            min-height: 100vh;
        }

        /* Profile Container Design */
        .profile-container {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            margin: 30px auto;
            width: 80%;
            max-width: 600px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #fff;
            object-fit: cover;
            margin-bottom: 15px;
            background-color: #ddd;
        }

        .profile-container h1 {
            margin: 10px 0;
            font-size: 2.5em;
        }

        .profile-container p {
            font-size: 1.2em;
            color: #d1d8e0;
            margin-bottom: 25px;
        }

        /* Upload Button Design */
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn {
            border: none;
            color: white;
            background-color: #ff4757;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #ff6b81;
        }

        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        /* Gallery Grid Design (Kafi Storage dikhane ke liye) */
        .gallery-container {
            width: 90%;
            margin: 0 auto 50px auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .gallery-item:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="https://via.placeholder.com/150" alt="Profile Picture" class="profile-pic">
        
        <h1>Deen Singh</h1>
        <p>Journalist & Content Creator</p>
        
        <div class="upload-btn-wrapper">
            <button class="btn">📸 Upload New Photo</button>
            <input type="file" id="imageUpload" accept="image/*" />
        </div>
    </div>

    <div class="gallery-container" id="photoGallery">
        </div>

    <script>
        const imageUpload = document.getElementById('imageUpload');
        const photoGallery = document.getElementById('photoGallery');

        imageUpload.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                
                reader.addEventListener('load', function() {
                    // Nayi photo ka HTML element banana
                    const newImage = document.createElement('img');
                    newImage.src = this.result;
                    newImage.className = 'gallery-item';
                    
                    // Photo ko gallery mein sabse aage add karna
                    photoGallery.prepend(newImage);
                });
                
                reader.readAsDataURL(file);
            }
        });
    </script>

</body>
</html>
