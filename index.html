<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deen Singh - My Gallery</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white; text-align: center;
        }
        .container {
            padding: 40px 20px;
            margin: 40px auto; width: 90%; max-width: 600px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .profile-pic {
            width: 120px; height: 120px; border-radius: 50%;
            border: 4px solid #4caf50; object-fit: cover; margin-bottom: 15px;
        }
        .btn {
            background: #2ea44f; color: white; border: none;
            padding: 12px 25px; border-radius: 8px; font-size: 16px;
            cursor: pointer; font-weight: bold; margin-top: 10px;
        }
        .btn:hover { background: #2c974b; }
        .upload-wrapper { position: relative; display: inline-block; }
        .upload-wrapper input[type=file] {
            position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; width: 100%;
        }
        #status { margin-top: 15px; font-weight: bold; color: #ffeb3b; }
        .gallery {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px; padding: 20px; max-width: 1000px; margin: 0 auto;
        }
        .gallery img {
            width: 100%; height: 200px; object-fit: cover; border-radius: 10px; border: 2px solid #fff;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://via.placeholder.com/120" alt="Deen Singh" class="profile-pic">
        
        <h1>Deen Singh's Gallery</h1>
        <p>यहाँ अपलोड की गई फोटो सीधे आपकी GitHub Repository में सेव होगी!</p>
        
        <div class="upload-wrapper">
            <button class="btn">📸 Select & Upload Photo</button>
            <input type="file" id="imageInput" accept="image/*" />
        </div>
        <div id="status"></div>
    </div>

    <div class="gallery" id="galleryContainer">
        </div>

    <script>
        // ==========================================
        // आपकी गिटहब डिटेल्स 
        // ==========================================
        const GITHUB_USERNAME = 'deensingh74-cyber'; 
        const REPO_NAME = 'Deen-singh';

        const FOLDER_NAME = 'gallery_photos';           
        // ==========================================

        const imageInput = document.getElementById('imageInput');
        const statusText = document.getElementById('status');
        const galleryContainer = document.getElementById('galleryContainer');

        // जब पेज लोड हो, तो पुरानी फोटोज गिटहब से निकालकर दिखाना
        async function loadExistingPhotos() {
            try {
                // टाइमस्टैम्प जोड़ रहे हैं ताकि पुरानी कैशे (Cache) फोटो न दिखे
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${FOLDER_NAME}?t=${Date.now()}`);
                if(response.ok) {
                    const files = await response.json();
                    
                    // फाइल्स को गैलरी में दिखाना
                    files.reverse().forEach(file => {
                        if(file.name.match(/\.(jpg|jpeg|png|gif)$/i)) {
                            const imgElem = document.createElement('img');
                            imgElem.src = file.download_url;
                            galleryContainer.appendChild(imgElem);
                        }
                    });
                }
            } catch(e) {
                console.log("अभी तक कोई फोटो नहीं है या फोल्डर नहीं बना है।");
            }
        }
        
        loadExistingPhotos();
